<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Junin Direção Hidráulica — Consulta Técnica de Caixas de Direção</title>
  <meta name="description" content="Sistema de consulta técnica offline para caixas de direção hidráulica, mecânica e elétrica. Catálogo completo de veículos nacionais.">
  <meta name="keywords" content="reparo direção hidráulica, caixa de direção, direção hidráulica, conserto caixa direção, mecânica automotiva">
  <meta name="author" content="Junin Direção Hidráulica">
  <meta property="og:title" content="Junin Direção Hidráulica — Consulta Técnica">
  <meta property="og:description" content="Catálogo técnico completo de caixas de direção para veículos nacionais. Procedimentos de desmontagem, montagem, torques e ferramentas.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ============================
       HEADER
       ============================ -->
  <header class="header">
    <div class="header-top">
      <a href="#" class="logo">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16z"/><path d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M4.93 19.07l1.41-1.41"/><path d="M17.66 6.34l1.41-1.41"/></svg>
        </div>
        <div class="logo-text">
          Junin
          <span>Direção Hidráulica</span>
        </div>
      </a>

      <div class="search-box">
        <span class="search-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="text" id="searchInput" placeholder="Buscar por modelo, marca, código, ano..." autocomplete="off">
      </div>

      <div class="header-actions">
        <span class="badge-count" id="resultsCount">0</span>
      </div>
    </div>

    <div class="header-filters">
      <div class="header-filters-inner">
        <span class="filter-label">Filtros:</span>
        <button class="filter-chip" data-filter="tipo" data-value="hidraulica">
          <span class="chip-icon"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg></span>
          Hidráulica
        </button>
        <button class="filter-chip" data-filter="tipo" data-value="mecanica">
          <span class="chip-icon"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.67 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.67a1.65 1.65 0 0 0 1.51-1H11a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
          Mecânica
        </button>
        <button class="filter-chip" data-filter="tipo" data-value="eletrica">
          <span class="chip-icon"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span>
          Elétrica EPS
        </button>
        <button class="filter-chip" data-filter="marca" data-value="Fiat">Fiat</button>
        <button class="filter-chip" data-filter="marca" data-value="Volkswagen">VW</button>
        <button class="filter-chip" data-filter="marca" data-value="Chevrolet">GM</button>
        <button class="filter-chip" data-filter="marca" data-value="Ford">Ford</button>
        <button class="filter-chip" data-filter="marca" data-value="Renault">Renault</button>
        <button class="filter-chip" data-filter="marca" data-value="Toyota">Toyota</button>
        <button class="filter-chip" data-filter="marca" data-value="Honda">Honda</button>
        <button class="filter-chip" data-filter="marca" data-value="Peugeot">Peugeot</button>
      </div>
    </div>
  </header>

  <!-- Ad Placeholder (top) -->
  <div class="ad-placeholder">Espaço reservado para anúncio</div>

  <!-- ============================
       MAIN LAYOUT
       ============================ -->
  <main class="main-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-card">
        <div class="sidebar-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
          Filtros Avançados
        </div>
        <div id="sidebarFilters">
          <!-- Renderizado via JS -->
        </div>
        <button class="sidebar-reset" id="btnResetFilters">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12"/><path d="M3 3v9h9"/></svg>
          Limpar Filtros
        </button>
      </div>
    </aside>

    <!-- Content -->
    <section class="content">
      <div class="results-header">
        <div class="results-count" id="resultsCount">0</div>
        <div class="results-sort">
          <span>Ordenar:</span>
          <select id="sortSelect">
            <option value="relevancia">Relevância</option>
            <option value="marca">Marca (A-Z)</option>
            <option value="ano">Ano</option>
          </select>
        </div>
      </div>

      <div class="results-grid" id="resultsGrid">
        <!-- Cards renderizados via JS -->
      </div>
    </section>
  </main>

  <!-- Ad Placeholder (bottom) -->
  <div class="ad-placeholder">Espaço reservado para anúncio</div>

  <!-- ============================
       MODAL
       ============================ -->
  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" id="modalContent">
      <div id="modalBody">
        <!-- Conteúdo renderizado via JS -->
      </div>
    </div>
  </div>

  <!-- ============================
       FOOTER
       ============================ -->
  <footer class="footer">
    <p><strong>Junin Direção Hidráulica</strong> — Sistema de Consulta Técnica</p>
    <p style="margin-top:0.3rem">Catálogo técnico de caixas de direção para veículos nacionais. Conteúdo técnico para profissionais.</p>
  </footer>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
